<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 14 · Selfish Booth · Jennifer Qian</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.day-page { --accent: #ff6eb4; }

    .day-hero { padding: 140px 6vw 60px; border-bottom: 1px solid var(--border); }
    .day-badge { display:inline-flex; align-items:center; gap:8px; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent); padding:5px 12px; border-radius:6px; margin-bottom:24px; }
    .day-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); }
    .day-num-bg { font-size:clamp(72px,14vw,160px); font-weight:700; line-height:0.85; color:transparent; -webkit-text-stroke:1px rgba(247,241,234,0.15); letter-spacing:-0.03em; margin-bottom:-20px; }
    .day-title { font-size:clamp(28px,5vw,56px); font-weight:700; letter-spacing:-0.02em; line-height:1.05; margin-bottom:20px; }
    .day-title .pink { color:var(--accent); }
    .day-meta { display:flex; flex-wrap:wrap; gap:24px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:32px; }
    .day-statement { max-width:760px; font-size:clamp(15px,2vw,18px); line-height:1.65; color:var(--ink-dim); border-left:2px solid var(--accent); padding-left:20px; font-style:italic; }
    .day-section-label { display:flex; align-items:center; gap:16px; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:48px; padding-top:64px; }
    .day-section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Booth ── */
    .booth-wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 6vw 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Step indicator ── */
    .booth-steps {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .step-dot.done { background: var(--accent); }
    .step-dot.active { background: #fff; transform: scale(1.3); }

    /* ── Cam view ── */
    .cam-box {
      position: relative;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      background: #0a0a14;
      border: 2px solid var(--border);
    }
    .cam-box.active { border-color: var(--accent); box-shadow: 0 0 24px rgba(255,110,180,0.3); }
    .cam-box.hidden { display: none; }

    #camVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }
    .cam-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    .countdown-num {
      font-size: 96px; font-weight: 700;
      color: white; line-height: 1;
      text-shadow: 0 0 40px rgba(255,110,180,0.8);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .countdown-num.show { opacity: 1; }
    .flash {
      position: absolute; inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
    }
    .flash.show { opacity: 1; }

    /* ── Slot label ── */
    .slot-label {
      font-size: 11px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
      text-align: center;
    }

    /* ── Result frame ── */
    .result-box {
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 60px rgba(255,110,180,0.25);
    }
    .result-box canvas {
      width: 100%; display: block;
    }

    /* ── Buttons ── */
    .booth-btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .booth-btn {
      padding: 13px 28px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--muted);
      font-family: inherit; font-size: 12px;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .booth-btn:hover { border-color: var(--accent); color: var(--accent); }
    .booth-btn.primary { border-color: var(--accent); color: var(--accent); }
    .booth-btn.primary:hover { background: var(--accent); color: #0a0a14; }
    .booth-btn:disabled { opacity: 0.3; pointer-events: none; }

    .booth-status {
      font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      text-align: center; min-height: 18px;
    }
  </style>
</head>
<body class="project-page day-page">

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="star-canvas" aria-hidden="true"></canvas>
  <div id="blob-trail" aria-hidden="true"></div>

  <nav id="nav">
    <div id="nav-logo-slot">
      <a href="index.html"><span id="nav-logo-text">Jennifer<span class="star-sep">★</span>Qian</span></a>
    </div>
    <div id="nav-links">
      <a href="index.html#work" class="nav-link">Work</a>
      <a href="index.html#about" class="nav-link">About</a>
      <a href="index.html#contact" class="nav-link">Contact</a>
    </div>
  </nav>

  <div class="day-hero">
    <div class="day-badge"><span class="dot"></span>90 Days of Making with AI · Day 14</div>
    <div class="day-num-bg">14</div>
    <h1 class="day-title">Selfish<br><span class="pink">Booth</span></h1>
    <div class="day-meta">
      <span>Jun 30, 2026</span>
      <span>Photobooth · Y2K</span>
    </div>
    <p class="day-statement">
      Three shots. One strip. Very Y2K.
    </p>
  </div>

  <div class="day-content" style="padding:0;">
    <div class="day-section-label" style="padding:0 6vw;">Try it</div>

    <div class="booth-wrap">

      <div class="booth-steps" id="stepsRow">
        <div class="step-dot active" id="dot0"></div>
        <div class="step-dot" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
      </div>

      <div class="slot-label" id="slotLabel">Get ready to snap photo 1 of 3</div>

      <!-- Live camera view -->
      <div class="cam-box" id="camBox">
        <video id="camVideo" autoplay playsinline muted></video>
        <div class="cam-overlay">
          <div class="countdown-num" id="countdownNum"></div>
        </div>
        <div class="flash" id="flashEl"></div>
      </div>

      <!-- Final composite result -->
      <div class="result-box" id="resultBox">
        <canvas id="resultCanvas"></canvas>
      </div>

      <div class="booth-status" id="boothStatus">Allow camera access to begin</div>

      <div class="booth-btn-row" id="btnRow">
        <button class="booth-btn primary" id="startBtn" onclick="startBooth()">📸 Start Camera</button>
        <button class="booth-btn" id="uploadBtn" onclick="triggerUpload()" style="display:none">🖼 Upload Instead</button>
        <button class="booth-btn primary" id="snapBtn" onclick="triggerSnap()" style="display:none">📸 Snap Photo 1</button>
        <button class="booth-btn" id="retakeBtn" onclick="retake()" style="display:none">↩ Retake</button>
        <button class="booth-btn primary" id="saveBtn" onclick="saveFinal()" style="display:none">↓ Save Strip</button>
        <button class="booth-btn" id="restartBtn" onclick="restartBooth()" style="display:none">↺ Start Over</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />

    </div>
  </div>

  <script src="script.js" defer></script>
  <script>
  (() => {
    /* ── Frame dimensions and slot positions (measured from day14_frame2.png 600×1550) ── */
    const FW = 600, FH = 1550;
    const SLOTS = [
      { x: 47,  y: 239, w: 504, h: 364, name: 'Hello Kitty' },
      { x: 44,  y: 632, w: 555, h: 297, name: 'Angel'       },
      { x: 123, y: 1064, w: 341, h: 219, name: 'Heart'      },
    ];

    /* ── State ── */
    let stream      = null;
    let photos      = [null, null, null];  // captured images per slot
    let current     = 0;  // which slot we're on
    let counting    = false;
    let frameImg    = null;

    /* ── Elements ── */
    const camBox      = document.getElementById('camBox');
    const camVideo    = document.getElementById('camVideo');
    const countdownEl = document.getElementById('countdownNum');
    const flashEl     = document.getElementById('flashEl');
    const resultBox   = document.getElementById('resultBox');
    const resultCvs   = document.getElementById('resultCanvas');
    const resultCtx   = resultCvs.getContext('2d');

    /* ── Load frame ── */
    function loadFrame(cb) {
      if (frameImg) { cb(); return; }
      frameImg = new Image();
      frameImg.onload = cb;
      frameImg.src = '90days/day14_frame2.png';
    }

    /* ── Helpers ── */
    function setStatus(msg) { document.getElementById('boothStatus').textContent = msg; }
    function setLabel(msg)  { document.getElementById('slotLabel').textContent = msg; }

    function showBtn(...ids) {
      ['startBtn','uploadBtn','snapBtn','retakeBtn','saveBtn','restartBtn'].forEach(id => {
        const el = document.getElementById(id);
        el.style.display = ids.includes(id) ? '' : 'none';
      });
    }

    function updateDots() {
      for (let i = 0; i < 3; i++) {
        const d = document.getElementById(`dot${i}`);
        d.className = 'step-dot' + (photos[i] ? ' done' : i === current ? ' active' : '');
      }
    }

    /* ── Draw cover (object-fit:cover equivalent) ── */
    function drawCover(ctx, img, x, y, w, h) {
      const r  = Math.max(w / img.naturalWidth, h / img.naturalHeight);
      const sw = w / r, sh = h / r;
      const sx = (img.naturalWidth  - sw) / 2;
      const sy = (img.naturalHeight - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    /* ── Composite and show ── */
    function renderComposite(target) {
      const ctx = target.getContext('2d');
      target.width  = FW;
      target.height = FH;
      ctx.clearRect(0, 0, FW, FH);
      // 1. Draw photos into their slots first
      SLOTS.forEach((s, i) => {
        if (!photos[i]) return;
        ctx.save();
        ctx.beginPath();
        ctx.rect(s.x, s.y, s.w, s.h);
        ctx.clip();
        drawCover(ctx, photos[i], s.x, s.y, s.w, s.h);
        ctx.restore();
      });
      // 2. Frame PNG on top (transparent areas show photos through)
      ctx.drawImage(frameImg, 0, 0, FW, FH);
    }

    function showPreview() {
      renderComposite(resultCvs);
    }

    /* ── Start booth ── */
    window.startBooth = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        camVideo.srcObject = stream;
        camBox.classList.add('active');
        showBtn('snapBtn', 'uploadBtn');
        setStatus('');
        setLabel(`Photo 1 of 3 — ${SLOTS[0].name}`);
        document.getElementById('snapBtn').textContent = '📸 Snap Photo 1';
        loadFrame(() => {});
      } catch(e) {
        setStatus('Camera blocked — use Upload Instead');
        showBtn('uploadBtn');
      }
    };

    /* ── Snap ── */
    window.triggerSnap = () => {
      if (counting) return;
      counting = true;
      showBtn();  // hide all during countdown
      let count = 3;
      countdownEl.textContent = count;
      countdownEl.classList.add('show');

      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          countdownEl.textContent = count;
        } else {
          clearInterval(interval);
          countdownEl.classList.remove('show');
          doCapture();
        }
      }, 1000);
    };

    function doCapture() {
      // Flash effect
      flashEl.classList.add('show');
      setTimeout(() => flashEl.classList.remove('show'), 120);

      // Capture from video
      const tmp = document.createElement('canvas');
      tmp.width  = camVideo.videoWidth  || 640;
      tmp.height = camVideo.videoHeight || 480;
      const tc = tmp.getContext('2d');
      tc.translate(tmp.width, 0);
      tc.scale(-1, 1);
      tc.drawImage(camVideo, 0, 0);

      const img = new Image();
      img.onload = () => {
        photos[current] = img;
        counting = false;
        afterCapture();
      };
      img.src = tmp.toDataURL('image/jpeg', 0.95);
    }

    function afterCapture() {
      loadFrame(() => {
        showPreview();

        if (current < 2) {
          current++;
          updateDots();
          setLabel(`Photo ${current + 1} of 3 — ${SLOTS[current].name}`);
          document.getElementById('snapBtn').textContent = `📸 Snap Photo ${current + 1}`;
          showBtn('snapBtn', 'retakeBtn', 'uploadBtn');
          setStatus('');
        } else {
          // All done
          updateDots();
          camBox.classList.add('hidden');
          resultBox.style.display = 'block';
          if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
          setLabel('Your strip is ready!');
          showBtn('saveBtn', 'restartBtn');
          setStatus('');
        }
      });
    }

    /* ── Retake last ── */
    window.retake = () => {
      if (current > 0 && photos[current - 1] && !photos[current]) {
        current--;
      }
      photos[current] = null;
      updateDots();
      setLabel(`Retake photo ${current + 1} of 3 — ${SLOTS[current].name}`);
      document.getElementById('snapBtn').textContent = `📸 Snap Photo ${current + 1}`;
      showBtn('snapBtn', 'uploadBtn');
      setStatus('');
      showPreview();
    };

    /* ── Upload fallback ── */
    window.triggerUpload = () => {
      document.getElementById('fileInput').value = '';
      document.getElementById('fileInput').click();
    };

    document.getElementById('fileInput').addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      const img = new Image();
      img.onload = () => {
        photos[current] = img;
        URL.revokeObjectURL(url);
        counting = false;
        loadFrame(afterCapture);
      };
      img.src = url;
    });

    /* ── Save ── */
    window.saveFinal = () => {
      const out = document.createElement('canvas');
      renderComposite(out);
      const a = document.createElement('a');
      a.href = out.toDataURL('image/png');
      a.download = 'selfish-booth.png';
      a.click();
    };

    /* ── Restart ── */
    window.restartBooth = () => {
      photos   = [null, null, null];
      current  = 0;
      camBox.classList.remove('hidden', 'active');
      resultBox.style.display = 'none';
      updateDots();
      setLabel('Get ready to snap photo 1 of 3');
      showBtn('startBtn');
      setStatus('Allow camera access to begin');
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    };

    /* ── Also allow webcam to auto-start preview loop ── */
    // Show preview canvas updating live during capture
    setInterval(() => {
      if (stream && photos.some(Boolean)) showPreview();
    }, 500);

  })();
  </script>
</body>
</html>
