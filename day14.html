<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 14 · Selfish Booth · Jennifer Qian</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.day-page { --accent: #ff6eb4; }

    .day-hero { padding: 140px 6vw 60px; border-bottom: 1px solid var(--border); }
    .day-badge { display:inline-flex; align-items:center; gap:8px; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent); padding:5px 12px; border-radius:6px; margin-bottom:24px; }
    .day-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); }
    .day-num-bg { font-size:clamp(72px,14vw,160px); font-weight:700; line-height:0.85; color:transparent; -webkit-text-stroke:1px rgba(247,241,234,0.15); letter-spacing:-0.03em; margin-bottom:-20px; }
    .day-title { font-size:clamp(28px,5vw,56px); font-weight:700; letter-spacing:-0.02em; line-height:1.05; margin-bottom:20px; }
    .day-title .pink { color:var(--accent); }
    .day-meta { display:flex; flex-wrap:wrap; gap:24px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:32px; }
    .day-statement { max-width:760px; font-size:clamp(15px,2vw,18px); line-height:1.65; color:var(--ink-dim); border-left:2px solid var(--accent); padding-left:20px; font-style:italic; }
    .day-section-label { display:flex; align-items:center; gap:16px; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:48px; padding-top:64px; }
    .day-section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .booth-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 6vw 100px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 32px;
    }

    .booth-frame-col {
      flex-shrink: 0;
      width: min(280px, 40vw);
    }

    .booth-controls-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 16px;
      position: sticky;
      top: 80px;
    }

    @media (max-width: 540px) {
      .booth-wrap { flex-direction: column; align-items: center; }
      .booth-frame-col { width: 100%; max-width: 300px; }
      .booth-controls-col { position: static; width: 100%; max-width: 300px; }
    }

    /* Live composite canvas — shows frame + webcam in current slot */
    #boothCanvas {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(255,110,180,0.2);
    }

    /* Hidden video source */
    #camVideo { display: none; }

    /* Step dots */
    .booth-steps { display:flex; gap:8px; align-items:center; }
    .step-dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.3s; }
    .step-dot.done { background:var(--accent); }
    .step-dot.active { background:#fff; transform:scale(1.3); }

    /* Countdown overlay shown over canvas */
    .countdown-wrap {
      position: relative;
      width: 100%;
      max-width: 300px;
    }
    #boothCanvas { display: block; }
    #countdownOverlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px; font-weight: 700;
      color: white;
      text-shadow: 0 0 40px rgba(255,110,180,0.9), 0 0 80px rgba(255,110,180,0.5);
      pointer-events: none;
      display: none;
    }

    .slot-label {
      font-size: 11px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
      text-align: center;
    }
    .booth-status {
      font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      text-align: center; min-height: 18px;
    }
    .booth-btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .booth-btn {
      padding: 13px 28px; background: none;
      border: 1px solid var(--border); border-radius: 24px;
      color: var(--muted); font-family: inherit; font-size: 12px;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .booth-btn:hover { border-color: var(--accent); color: var(--accent); }
    .booth-btn.primary { border-color: var(--accent); color: var(--accent); }
    .booth-btn.primary:hover { background: var(--accent); color: #0a0a14; }
    .booth-btn:disabled { opacity: 0.3; pointer-events: none; }
  </style>
</head>
<body class="project-page day-page">

  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="star-canvas" aria-hidden="true"></canvas>
  <div id="blob-trail" aria-hidden="true"></div>

  <nav id="nav">
    <div id="nav-logo-slot">
      <a href="index.html"><span id="nav-logo-text">Jennifer<span class="star-sep">★</span>Qian</span></a>
    </div>
    <div id="nav-links">
      <a href="index.html#work" class="nav-link">Work</a>
      <a href="index.html#about" class="nav-link">About</a>
      <a href="index.html#contact" class="nav-link">Contact</a>
    </div>
  </nav>

  <div class="day-hero">
    <div class="day-badge"><span class="dot"></span>90 Days of Making with AI · Day 14</div>
    <div class="day-num-bg">14</div>
    <h1 class="day-title">Selfish<br><span class="pink">Booth</span></h1>
    <div class="day-meta">
      <span>Jun 30, 2026</span>
      <span>Photobooth · Y2K</span>
    </div>
    <p class="day-statement">
      Three shots. One strip. Very Y2K.
    </p>
  </div>

  <div class="day-content" style="padding:0;">
    <div class="day-section-label" style="padding:0 6vw;">Try it</div>

    <div class="booth-wrap">

      <!-- Left: frame canvas -->
      <div class="booth-frame-col">
        <div class="countdown-wrap">
          <canvas id="boothCanvas"></canvas>
          <div id="countdownOverlay"></div>
        </div>
        <video id="camVideo" autoplay playsinline muted></video>
      </div>

      <!-- Right: controls -->
      <div class="booth-controls-col">
        <div class="booth-steps">
          <div class="step-dot active" id="dot0"></div>
          <div class="step-dot" id="dot1"></div>
          <div class="step-dot" id="dot2"></div>
        </div>

        <div class="slot-label" id="slotLabel">Ready to shoot</div>

        <div class="booth-status" id="boothStatus"></div>

        <div class="booth-btn-row" style="flex-direction:column; align-items:flex-start;">
          <button class="booth-btn primary" id="startBtn" onclick="startBooth()">📸 Start Camera</button>
          <button class="booth-btn" id="uploadBtn" onclick="triggerUpload()" style="display:none">🖼 Upload Photo</button>
          <button class="booth-btn primary" id="snapBtn" onclick="triggerSnap()" style="display:none">📸 Snap</button>
          <button class="booth-btn" id="retakeBtn" onclick="retake()" style="display:none">↩ Retake</button>
          <button class="booth-btn primary" id="saveBtn" onclick="saveFinal()" style="display:none">↓ Save Strip</button>
          <button class="booth-btn" id="restartBtn" onclick="restartBooth()" style="display:none">↺ Start Over</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>

    </div>
  </div>

  <script src="script.js" defer></script>
  <script>
  (() => {
    /* ── Frame: 600×1550, transparent slots ── */
    const FW = 600, FH = 1550;
    // clip: full section for clipping; draw: transparent area center for crop
    const SLOTS = [
      { x: 0, y: 80,  w: 600, h: 552, dx: 56,  dy: 234,  dw: 489, dh: 348 },
      { x: 0, y: 582, w: 600, h: 445, dx: 72,  dy: 627,  dw: 487, dh: 307 },
      { x: 0, y: 977, w: 600, h: 573, dx: 128, dy: 1069, dw: 331, dh: 208 },
    ];
    const NAMES = ['Hello Kitty', 'Angel', 'Heart'];

    /* ── State ── */
    let stream    = null;
    let frameImg  = null;
    let photos    = [null, null, null];
    let current   = 0;
    let counting  = false;
    let rafId     = null;
    let done      = false;

    /* ── Canvas ── */
    const canvas = document.getElementById('boothCanvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = FW;
    canvas.height = FH;
    const camVideo = document.getElementById('camVideo');

    /* ── Load frame ── */
    function loadFrame() {
      return new Promise(res => {
        if (frameImg) { res(); return; }
        frameImg = new Image();
        frameImg.onload = res;
        frameImg.src = '90days/day14_frame2.png';
      });
    }

    /* ── draw cover helper ── */
    function drawCover(img, x, y, w, h, mirror) {
      const r  = Math.max(w / img.naturalWidth, h / img.naturalHeight);
      const sw = w / r, sh = h / r;
      const sx = (img.naturalWidth  - sw) / 2;
      const sy = (img.naturalHeight - sh) / 2;
      if (mirror) {
        ctx.save();
        ctx.translate(x + w, y);
        ctx.scale(-1, 1);
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
        ctx.restore();
      } else {
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      }
    }

    /* ── Draw video into a slot (same math as drawCover for consistency) ── */
    function drawVideoInSlot(s) {
      if (!camVideo.videoWidth) return;
      ctx.save();
      ctx.beginPath();
      ctx.rect(s.x, s.y, s.w, s.h);
      ctx.clip();
      const r  = Math.max(s.w / camVideo.videoWidth, s.h / camVideo.videoHeight);
      const sw = s.w / r, sh = s.h / r;
      const sx = (camVideo.videoWidth  - sw) / 2;
      const sy = (camVideo.videoHeight - sh) / 2;
      ctx.translate(s.x + s.w, s.y);
      ctx.scale(-1, 1);
      ctx.drawImage(camVideo, sx, sy, sw, sh, 0, 0, s.w, s.h);
      ctx.restore();
    }

    /* ── Main render loop ── */
    function render() {
      ctx.clearRect(0, 0, FW, FH);

      // Draw captured photos (clip to full section, crop centered on transparent area)
      SLOTS.forEach((s, i) => {
        if (photos[i]) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(s.x, s.y, s.w, s.h);
          ctx.clip();
          drawCover(photos[i], s.x, s.y, s.w, s.h, true);
          ctx.restore();
        }
      });

      // Draw live video in current slot if webcam active and not done
      if (stream && !done && current < 3 && !photos[current]) {
        drawVideoInSlot(SLOTS[current]);
      }

      // Frame overlay on top
      if (frameImg) ctx.drawImage(frameImg, 0, 0, FW, FH);

      if (!done) rafId = requestAnimationFrame(render);
    }

    /* ── UI helpers ── */
    function showBtns(...ids) {
      ['startBtn','uploadBtn','snapBtn','retakeBtn','saveBtn','restartBtn'].forEach(id => {
        document.getElementById(id).style.display = ids.includes(id) ? '' : 'none';
      });
    }
    function setStatus(t) { document.getElementById('boothStatus').textContent = t; }
    function setLabel(t)  { document.getElementById('slotLabel').textContent = t; }
    function updateDots() {
      for (let i = 0; i < 3; i++) {
        const d = document.getElementById(`dot${i}`);
        d.className = 'step-dot' + (photos[i] ? ' done' : i === current ? ' active' : '');
      }
    }

    /* ── Start ── */
    window.startBooth = async () => {
      document.getElementById('startBtn').disabled = true;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        camVideo.srcObject = stream;
        await loadFrame();
        rafId = requestAnimationFrame(render);
        showBtns('snapBtn', 'uploadBtn');
        setLabel(`Photo 1 of 3 — ${NAMES[0]}`);
        setStatus('');
        updateDots();
      } catch(e) {
        setStatus('Camera not available — use Upload');
        showBtns('uploadBtn');
        await loadFrame();
        render();
      }
    };

    /* ── Snap with countdown ── */
    window.triggerSnap = () => {
      if (counting) return;
      counting = true;
      showBtns();
      const overlay = document.getElementById('countdownOverlay');
      let n = 3;
      overlay.textContent = n;
      overlay.style.display = 'block';
      const iv = setInterval(() => {
        n--;
        if (n > 0) {
          overlay.textContent = n;
        } else {
          clearInterval(iv);
          overlay.style.display = 'none';
          capture();
        }
      }, 1000);
    };

    function capture() {
      // Flash
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, FW, FH);
      setTimeout(() => {
        // Snapshot current video frame
        const tmp = document.createElement('canvas');
        tmp.width  = camVideo.videoWidth  || 640;
        tmp.height = camVideo.videoHeight || 480;
        const tc = tmp.getContext('2d');
        tc.drawImage(camVideo, 0, 0); // not mirrored — we'll mirror on display
        const img = new Image();
        img.onload = () => {
          photos[current] = img;
          counting = false;
          advance();
        };
        img.src = tmp.toDataURL('image/jpeg', 0.95);
      }, 80);
    }

    function advance() {
      if (current < 2) {
        current++;
        updateDots();
        setLabel(`Photo ${current + 1} of 3 — ${NAMES[current]}`);
        showBtns('snapBtn', 'retakeBtn', 'uploadBtn');
        setStatus('');
      } else {
        // All done
        done = true;
        cancelAnimationFrame(rafId);
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        // Final render — same as live loop for consistency
        ctx.clearRect(0, 0, FW, FH);
        SLOTS.forEach((s, i) => {
          if (!photos[i]) return;
          ctx.save();
          ctx.beginPath();
          ctx.rect(s.x, s.y, s.w, s.h);
          ctx.clip();
          drawCover(photos[i], s.x, s.y, s.w, s.h, true);
          ctx.restore();
        });
        ctx.drawImage(frameImg, 0, 0, FW, FH);

        updateDots();
        setLabel('Your strip is ready!');
        showBtns('saveBtn', 'restartBtn');
        setStatus('');
      }
    }

    /* ── Retake ── */
    window.retake = () => {
      if (current > 0 && photos[current] === null) current--;
      photos[current] = null;
      done = false;
      updateDots();
      setLabel(`Photo ${current + 1} of 3 — ${NAMES[current]}`);
      showBtns('snapBtn', 'uploadBtn');
      setStatus('');
      if (stream && !rafId) rafId = requestAnimationFrame(render);
    };

    /* ── Upload fallback ── */
    window.triggerUpload = () => {
      document.getElementById('fileInput').value = '';
      document.getElementById('fileInput').click();
    };
    document.getElementById('fileInput').addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      const img = new Image();
      img.onload = () => {
        photos[current] = img;
        URL.revokeObjectURL(url);
        counting = false;
        advance();
      };
      img.src = url;
    });

    /* ── Save ── */
    window.saveFinal = () => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'selfish-booth.png';
      a.click();
    };

    /* ── Restart ── */
    window.restartBooth = () => {
      photos = [null, null, null];
      current = 0; done = false;
      cancelAnimationFrame(rafId); rafId = null;
      updateDots();
      setLabel('Ready to shoot');
      showBtns('startBtn');
      setStatus('');
      ctx.clearRect(0, 0, FW, FH);
      if (frameImg) ctx.drawImage(frameImg, 0, 0, FW, FH);
    };

    /* ── Initial frame render ── */
    loadFrame().then(() => {
      ctx.drawImage(frameImg, 0, 0, FW, FH);
    });

  })();
  </script>
</body>
</html>
